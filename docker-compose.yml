services:

  apache-container:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www/html/proyectoCGS
    ports:
      - "80:80"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASS=
      - MYSQL_DB=sporthubCordoba
    depends_on:
      - mysql
      - phpmyadmin

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ''
    depends_on:
      - mysql

  mysql:
    image: mysql:8.1.0
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
      MYSQL_DATABASE: sporthubCordoba
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
